spring:
  application:
    name: task_queue

  datasource:
    url: jdbc:postgresql://localhost:5433/taskqueue
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true


app:
  workers:
    count: 3
    max-retries: 3
    stuck-threshold-minutes: 10